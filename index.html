<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบสืบค้นหัวเรื่อง (AI Vector Search)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background-color: #f9f9f9; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input[type="text"] { width: 70%; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; font-size: 16px; background: #10b981; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:disabled { background: #ccc; }
        .result-box { margin-top: 20px; padding: 15px; border-left: 5px solid #10b981; background: #f0fdf4; margin-bottom: 10px; }
        #status { margin-top: 10px; color: #666; font-style: italic; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>📚 ค้นหาหัวเรื่องด้วย AI (Semantic Search)</h2>
    <p>ค้นหาด้วยความหมาย ไม่ต้องพิมพ์ตรงเป๊ะก็หาเจอ</p>
    
    <input type="text" id="searchInput" placeholder="พิมพ์คำที่ต้องการค้นหา เช่น น้ำ, สมอง...">
    <button id="searchBtn" disabled>กำลังเตรียมระบบ...</button>
    
    <div id="status">กำลังเริ่มต้นระบบ...</div>
    
    <div id="results"></div>
</div>

<!-- สคริปต์การทำงานหลักทั้งหมด (แบบ Module) -->
<script type="module">
    // 1. นำเข้า Supabase แบบ ES Module (แก้ปัญหา undefined)
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    
    // 2. นำเข้า Transformers.js (AI)
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.16.0';

    // 3. ปิดการหาโมเดลในเครื่อง ให้โหลดจากเน็ตชัวร์ๆ
    env.allowLocalModels = false;
    env.useBrowserCache = true;

    // 4. ตั้งค่า Supabase (❗อย่าลืมเปลี่ยนเป็น KEY ของคุณ)
    const SUPABASE_URL = 'https://ssprqorqzdlkgnzualgg.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNzcHJxb3JxemRsa2duenVhbGdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNTE0NDUsImV4cCI6MjA5MTcyNzQ0NX0.IUwXtppG8zsV5W1EkLzIvAmf7R1Hmnp5bKzDhyIjnBo'; 
    
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // อ้างอิงหน้าตาเว็บ
    const statusDiv = document.getElementById('status');
    const searchBtn = document.getElementById('searchBtn');

    let extractor;

    // 5. ฟังก์ชันโหลดโมเดล AI
    async function initModel() {
        try {
            statusDiv.innerText = "⏳ กำลังดาวน์โหลดสมอง AI (100MB+) โปรดรอสักครู่...";
            extractor = await pipeline('feature-extraction', 'Xenova/paraphrase-multilingual-MiniLM-L12-v2');
            
            statusDiv.innerText = "✅ AI พร้อมใช้งานแล้ว! พิมพ์ค้นหาได้เลย";
            statusDiv.style.color = "green";
            searchBtn.innerText = "ค้นหา";
            searchBtn.disabled = false;
        } catch (error) {
            console.error("AI Load Error:", error);
            statusDiv.innerText = "❌ โหลดโมเดล AI ไม่สำเร็จ";
            statusDiv.style.color = "red";
        }
    }
    
    // สั่งให้เริ่มโหลด AI ทันทีที่เปิดหน้าเว็บ
    initModel();

    // 6. เมื่อผู้ใช้กดปุ่มค้นหา
    searchBtn.addEventListener('click', async () => {
        const queryText = document.getElementById('searchInput').value;
        if (!queryText) return;

        statusDiv.innerText = "⏳ กำลังคำนวณและค้นหาในฐานข้อมูล...";
        document.getElementById('results').innerHTML = "";

        try {
            // แปลงข้อความให้เป็น Vector 384 มิติ
            const output = await extractor(queryText, { pooling: 'mean', normalize: true });
            const queryEmbedding = Array.from(output.data);

            // ยิงข้อมูลไปถาม Supabase
            const { data, error } = await supabase.rpc('match_subjects', {
                query_embedding: queryEmbedding,
                match_threshold: 0.2, // ความคล้ายขั้นต่ำ ปรับเป็น 0.2 เพื่อให้เจอข้อมูลกว้างขึ้น
                match_count: 5
            });

            if (error) throw error;

            statusDiv.innerText = "✅ ค้นหาเสร็จสิ้น";

            // แสดงผลบนหน้าเว็บ
            if (data && data.length > 0) {
                data.forEach(item => {
                    const percentMatch = (item.similarity * 100).toFixed(1);
                    document.getElementById('results').innerHTML += `
                        <div class="result-box">
                            <strong>🇹🇭 ${item.thai_topic}</strong> <br>
                            🇬🇧 ${item.english_topic} <br>
                            <small>ความเกี่ยวข้อง: ${percentMatch}%</small>
                        </div>
                    `;
                });
            } else {
                document.getElementById('results').innerHTML = "<p style='color:red;'>ไม่พบข้อมูลที่ใกล้เคียง ลองเปลี่ยนคำค้นหาดูครับ</p>";
            }

        } catch (error) {
            console.error("Search Error:", error);
            statusDiv.innerText = "❌ เกิดข้อผิดพลาดในการค้นหา";
        }
    });
</script>

</body>
</html>
