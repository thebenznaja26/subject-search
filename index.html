<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ค้นหาหัวข้อวิทยานิพนธ์ด้วย AI</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #status { margin-bottom: 20px; }
        .result-box { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
    </style>
<script type="module">
    // 1. นำเข้า pipeline และ env
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.16.0';

    // 2. ตั้งค่าให้โหลดโมเดลจากเน็ตเท่านั้น
    env.allowLocalModels = false;
    env.useBrowserCache = true;

    // 3. ตั้งค่า Supabase (อย่าลืมใส่ ANON KEY ของคุณ)
    const SUPABASE_URL = 'https://ssprqorqzdlkgnzualgg.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNzcHJxb3JxemRsa2duenVhbGdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxNTE0NDUsImV4cCI6MjA5MTcyNzQ0NX0.IUwXtppG8zsV5W1EkLzIvAmf7R1Hmnp5bKzDhyIjnBo'; 
    
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    let extractor;
    const statusDiv = document.getElementById('status');
    const searchBtn = document.getElementById('searchBtn');

    // 4. โหลด AI Model
    async function initModel() {
        try {
            statusDiv.innerText = "⏳ กำลังดาวน์โหลดโมเดล AI (100MB+) โปรดรอสักครู่...";
            // โหลดโมเดลตัวเดียวกับ Python
            extractor = await pipeline('feature-extraction', 'Xenova/paraphrase-multilingual-MiniLM-L12-v2');
            statusDiv.innerText = "✅ AI พร้อมใช้งานแล้ว! พิมพ์ค้นหาได้เลย";
            statusDiv.style.color = "green";
            searchBtn.innerText = "ค้นหา";
            searchBtn.disabled = false;
        } catch (error) {
            console.error("AI Load Error:", error);
            statusDiv.innerText = "❌ โหลดโมเดล AI ไม่สำเร็จ (ดูใน Console)";
            statusDiv.style.color = "red";
        }
    }
    
    initModel();

    // 5. ฟังก์ชันค้นหาเมื่อกดปุ่ม
    searchBtn.addEventListener('click', async () => {
        const queryText = document.getElementById('searchInput').value;
        if (!queryText) return;

        statusDiv.innerText = "⏳ กำลังคำนวณและค้นหา...";
        document.getElementById('results').innerHTML = "";

        try {
            // แปลงคำค้นหาเป็น Vector
            const output = await extractor(queryText, { pooling: 'mean', normalize: true });
            const queryEmbedding = Array.from(output.data);

            // ส่ง Vector ไปเทียบใน Supabase
            const { data, error } = await supabaseClient.rpc('match_subjects', {
                query_embedding: queryEmbedding,
                match_threshold: 0.3, // ความแม่นยำ (0.0 - 1.0) ลองปรับดูได้
                match_count: 5 // เอา 5 อันดับแรก
            });

            if (error) throw error;

            statusDiv.innerText = "✅ ค้นหาสร็จสิ้น";

            // 6. แสดงผลลัพธ์
            if (data && data.length > 0) {
                data.forEach(item => {
                    const percentMatch = (item.similarity * 100).toFixed(1);
                    document.getElementById('results').innerHTML += `
                        <div class="result-box">
                            <strong>🇹🇭 ${item.thai_topic}</strong> <br>
                            🇬🇧 ${item.english_topic} <br>
                            <small>ความคล้าย: ${percentMatch}%</small>
                        </div>
                    `;
                });
            } else {
                document.getElementById('results').innerHTML = "<p>ไม่พบข้อมูลที่ตรงความหมาย</p>";
            }

        } catch (error) {
            console.error("Search Error:", error);
            statusDiv.innerText = "❌ เกิดข้อผิดพลาดในการค้นหา";
        }
    });
</script>
</head>
<body>
